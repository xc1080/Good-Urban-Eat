sky:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: sky_take_out
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
  alioss:
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name
    endpoint: oss-cn-beijing.aliyuncs.com
    region: cn-beijing
  wechat:
    appid: your-appid
    secret: your-secret
    mchid: your-mchid
    mch-serial-no: your-mch-serial-no
    private-key-file-path: your-private-key-file-path
    api-v3-key: your-api-v3-key
    notify-url: https://your-domain/notify/paySuccess
    refund-notify-url: https://your-domain/notify/refundSuccess
  baidu:
    ak: your-baidu-ak
    location-url: https://api.map.baidu.com/geocoding/v3
    distance-url: https://api.map.baidu.com/routematrix/v2/driving
  shop:
    location:
      lng: 116.397128
      lat: 39.916527
    limit-distance: 5000
